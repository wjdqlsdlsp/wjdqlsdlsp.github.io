<div class="contact">
  <ul class="contact__list list-reset">
    {% if site.data.settings.twitter %}
      <li><a href="{{ site.data.settings.twitter }}"><img src ="https://cdn2.iconfinder.com/data/icons/social-media-2285/512/1_Linkedin_unofficial_colored_svg-512.png" style ="width:15px;height:18px; padding-bottom:3px;"> LinkedIn</a></li>
    {% else %} {% endif %}

    {% if site.data.settings.facebook %}
      <li><a href="{{ site.data.settings.facebook }}"><img src ="https://cdn3.iconfinder.com/data/icons/logos-and-brands-adobe/512/189_Kaggle-512.png" style ="width:15px;height:18px; padding-bottom:3px;"> Kaggle</a></li>
    {% else %} {% endif %}
  
    {% if site.data.settings.dribbble %}
      <li><a href="{{ site.data.settings.dribbble }}"><img src ="https://cdn3.iconfinder.com/data/icons/social-media-2253/25/Group-512.png" style ="width:15px;height:18px; padding-bottom:3px;"> Github</a></li>
    {% else %} {% endif %}
  

  </ul>
</div>
